<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>26. 04. 01. WED</title>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --sidebar-bg: #f7f6f3;
      --sidebar-width: 240px;
      --sidebar-text: #37352f;
      --sidebar-muted: #9b9a97;
      --sidebar-hover: #e9e8e4;
      --sidebar-active: #e3e2de;
      --text-primary: #37352f;
      --text-secondary: #9b9a97;
      --border: #e8e7e3;
      --font: 'Noto Sans KR', sans-serif;
    }

    body {
      font-family: var(--font);
      background: #ffffff;
      color: var(--text-primary);
      display: flex;
      height: 100vh;
      overflow: hidden;
    }

    .sidebar {
      width: var(--sidebar-width);
      background: var(--sidebar-bg);
      height: 100vh;
      overflow-y: auto;
      flex-shrink: 0;
      padding: 12px 0;
      border-right: 1px solid var(--border);
    }

    .sidebar-label {
      font-size: 11px;
      font-weight: 500;
      color: var(--sidebar-muted);
      padding: 8px 14px 4px;
      letter-spacing: 0.04em;
    }

    .sidebar-item {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 5px 14px;
      font-size: 13.5px;
      color: var(--sidebar-text);
      cursor: pointer;
      border-radius: 4px;
      margin: 1px 6px;
      transition: background 0.1s;
      user-select: none;
      text-decoration: none;
    }

    .sidebar-item:hover { background: var(--sidebar-hover); }
    .sidebar-item.active { background: var(--sidebar-active); font-weight: 500; }
    .sidebar-item .icon { font-size: 15px; width: 20px; text-align: center; flex-shrink: 0; }
    .sidebar-divider { height: 1px; background: var(--border); margin: 8px 14px; }

    .main { flex: 1; overflow-y: auto; padding: 80px 96px 120px; max-width: 860px; }

    .page-title {
      font-size: 40px;
      font-weight: 700;
      color: var(--text-primary);
      margin-bottom: 28px;
      letter-spacing: -0.02em;
      line-height: 1.2;
    }

    .page-divider { height: 1px; background: var(--border); margin-bottom: 20px; }

    .back-btn {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      font-size: 13px;
      color: var(--text-secondary);
      cursor: pointer;
      margin-bottom: 32px;
      padding: 4px 8px;
      border-radius: 4px;
      transition: background 0.1s;
      text-decoration: none;
    }
    .back-btn:hover { background: var(--sidebar-hover); color: var(--text-primary); }

    .empty-hint { margin-top: 40px; color: #c7c5c0; font-size: 14px; }

    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-thumb { background: #d3d1cb; border-radius: 3px; }
  </style>
</head>
<body>

<nav class="sidebar">
  <div class="sidebar-label">개인 페이지</div>
  <a class="sidebar-item" href="index.html"><span class="icon">😊</span><span>To Do List</span></a>
  <a class="sidebar-item" href="index.html"><span class="icon">📋</span><span>정보과학</span></a>
  <a class="sidebar-item" href="index.html"><span class="icon">📄</span><span>자율연구</span></a>
  <a class="sidebar-item" href="index.html"><span class="icon">✨</span><span>방학</span></a>
  <a class="sidebar-item" href="index.html"><span class="icon">📄</span><span>생기부 특기사항</span></a>
  <div class="sidebar-divider"></div>
</nav>

<main class="main">
  <a class="back-btn" href="index.html">← 자율연구로 돌아가기</a>
  <div class="page-title">26. 04. 01. WED</div>
  <div class="page-divider"></div>

  <!-- ✏️ 여기에 페이지 내용을 추가하세요 -->

</main>

<script>

</script>

</body>
</html>
