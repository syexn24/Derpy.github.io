<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SecureBank CTF</title>
  <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Orbitron:wght@400;700&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg: #0a0c10;
      --surface: #0d1117;
      --surface2: #161b22;
      --border: #21262d;
      --green: #39d353;
      --green-dim: #1a4a2e;
      --blue: #58a6ff;
      --red: #f85149;
      --red-dim: #3d0f0e;
      --yellow: #e3b341;
      --purple: #bc8cff;
      --text: #e6edf3;
      --muted: #8b949e;
      --font-mono: 'Share Tech Mono', monospace;
      --font-display: 'Orbitron', monospace;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--font-mono);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 40px 16px;
    }

    /* scanline overlay */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background: repeating-linear-gradient(
        0deg,
        transparent,
        transparent 2px,
        rgba(0,0,0,0.08) 2px,
        rgba(0,0,0,0.08) 4px
      );
      pointer-events: none;
      z-index: 999;
    }

    .header {
      text-align: center;
      margin-bottom: 36px;
    }

    .header h1 {
      font-family: var(--font-display);
      font-size: clamp(20px, 4vw, 32px);
      color: var(--green);
      letter-spacing: 0.15em;
      text-shadow: 0 0 20px rgba(57,211,83,0.4);
      animation: flicker 6s infinite;
    }

    .header p {
      color: var(--muted);
      font-size: 12px;
      margin-top: 8px;
      letter-spacing: 0.1em;
    }

    @keyframes flicker {
      0%, 95%, 100% { opacity: 1; }
      96% { opacity: 0.6; }
      97% { opacity: 1; }
      98% { opacity: 0.4; }
      99% { opacity: 1; }
    }

    .scorebar {
      display: flex;
      gap: 12px;
      margin-bottom: 24px;
      flex-wrap: wrap;
      justify-content: center;
    }

    .score-chip {
      border: 1px solid var(--border);
      border-radius: 4px;
      padding: 6px 14px;
      font-size: 12px;
      color: var(--muted);
      letter-spacing: 0.05em;
    }

    .score-chip span { color: var(--blue); }

    .card {
      width: 100%;
      max-width: 540px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      overflow: hidden;
    }

    .card-header {
      background: var(--surface2);
      border-bottom: 1px solid var(--border);
      padding: 12px 20px;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .dots { display: flex; gap: 6px; }
    .dot { width: 11px; height: 11px; border-radius: 50%; }
    .d1 { background: #ff5f57; }
    .d2 { background: #ffbd2e; }
    .d3 { background: #28ca41; }

    .card-title {
      font-family: var(--font-display);
      font-size: 11px;
      color: var(--muted);
      letter-spacing: 0.1em;
      margin-left: 4px;
    }

    .card-body { padding: 24px 20px; }

    .challenge-label {
      font-size: 11px;
      color: var(--yellow);
      letter-spacing: 0.1em;
      margin-bottom: 6px;
    }

    .challenge-title {
      font-family: var(--font-display);
      font-size: 14px;
      color: var(--text);
      margin-bottom: 20px;
    }

    .field { margin-bottom: 14px; }

    .field label {
      display: block;
      font-size: 11px;
      color: var(--muted);
      letter-spacing: 0.1em;
      margin-bottom: 6px;
    }

    .field input {
      width: 100%;
      background: #060810;
      border: 1px solid var(--border);
      border-radius: 4px;
      padding: 10px 14px;
      color: var(--green);
      font-family: var(--font-mono);
      font-size: 13px;
      outline: none;
      transition: border-color 0.2s;
      caret-color: var(--green);
    }

    .field input:focus { border-color: var(--green); box-shadow: 0 0 0 2px rgba(57,211,83,0.1); }
    .field input::placeholder { color: #30363d; }

    .btn-row { display: flex; gap: 8px; margin-top: 4px; }

    .btn-login {
      flex: 1;
      padding: 10px;
      background: var(--green-dim);
      border: 1px solid var(--green);
      border-radius: 4px;
      color: var(--green);
      font-family: var(--font-mono);
      font-size: 13px;
      letter-spacing: 0.05em;
      cursor: pointer;
      transition: background 0.2s, box-shadow 0.2s;
    }

    .btn-login:hover {
      background: rgba(57,211,83,0.2);
      box-shadow: 0 0 12px rgba(57,211,83,0.2);
    }

    .output {
      margin-top: 14px;
      padding: 12px 16px;
      border-radius: 4px;
      font-size: 13px;
      line-height: 1.6;
      display: none;
      animation: fadein 0.3s ease;
    }

    @keyframes fadein { from { opacity:0; transform: translateY(-4px); } to { opacity:1; transform: none; } }

    .output.error { display: block; background: var(--red-dim); border: 1px solid var(--red); color: var(--red); }
    .output.success { display: block; background: var(--green-dim); border: 1px solid var(--green); color: var(--green); }
    .output.info { display: block; background: #0c1f3a; border: 1px solid var(--blue); color: var(--blue); }
    .output.loading { display: block; background: var(--surface2); border: 1px solid var(--border); color: var(--muted); }

    .flag-box {
      margin-top: 10px;
      background: #1a0d2e;
      border: 1px solid var(--purple);
      border-radius: 4px;
      padding: 10px 14px;
      color: var(--purple);
      font-size: 14px;
      letter-spacing: 0.08em;
      word-break: break-all;
      text-shadow: 0 0 10px rgba(188,140,255,0.4);
    }

    .query-box {
      margin-top: 12px;
      background: #060810;
      border: 1px solid var(--border);
      border-radius: 4px;
      padding: 10px 14px;
      font-size: 12px;
      color: #79c0ff;
      display: none;
      word-break: break-all;
      line-height: 1.7;
    }

    .kw { color: #ff7b72; }
    .str { color: #a5d6ff; }

    .hint-row {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      margin-top: 16px;
      padding-top: 14px;
      border-top: 1px solid var(--border);
    }

    .hint-btn {
      background: transparent;
      border: 1px solid var(--border);
      border-radius: 4px;
      color: var(--muted);
      font-size: 11px;
      padding: 5px 10px;
      cursor: pointer;
      font-family: var(--font-mono);
      letter-spacing: 0.05em;
      transition: border-color 0.2s, color 0.2s;
    }

    .hint-btn:hover { border-color: var(--blue); color: var(--blue); }

    .progress-row {
      display: flex;
      gap: 6px;
      margin-top: 20px;
    }

    .prog-step {
      flex: 1;
      height: 3px;
      background: var(--border);
      border-radius: 2px;
      transition: background 0.4s;
    }

    .prog-step.done { background: var(--green); box-shadow: 0 0 6px rgba(57,211,83,0.5); }
    .prog-step.active { background: var(--yellow); }

    .footer {
      margin-top: 28px;
      font-size: 11px;
      color: #3d4450;
      letter-spacing: 0.05em;
    }
  </style>
</head>
<body>

<div class="header">
  <h1>SECUREBANK CTF</h1>
  <p>// SQL INJECTION CHALLENGE — 플래그를 탈취하라</p>
</div>

<div class="scorebar">
  <div class="score-chip">LEVEL <span id="lvl">1</span> / 3</div>
  <div class="score-chip">CLEARED <span id="clr">0</span> / 3</div>
</div>

<div class="card">
  <div class="card-header">
    <div class="dots">
      <div class="dot d1"></div>
      <div class="dot d2"></div>
      <div class="dot d3"></div>
    </div>
    <span class="card-title" id="card-label">CHALLENGE_01.exe</span>
  </div>
  <div class="card-body">
    <div class="challenge-label" id="ch-label">[ LEVEL 01 ]</div>
    <div class="challenge-title" id="ch-title">기본 인증 우회</div>

    <div class="field">
      <label>USERNAME</label>
      <input id="username" type="text" placeholder="admin" autocomplete="off" />
    </div>
    <div class="field">
      <label>PASSWORD</label>
      <input id="password" type="text" placeholder="••••••••" autocomplete="off" />
    </div>

    <div class="btn-row">
      <button class="btn-login" onclick="tryLogin()">[ LOGIN ]</button>
    </div>

    <div class="output" id="output"></div>
    <div class="query-box" id="qbox"></div>

    <div class="hint-row">
      <button class="hint-btn" onclick="showHint(0)">HINT_1</button>
      <button class="hint-btn" onclick="showHint(1)">HINT_2</button>
      <button class="hint-btn" onclick="showQueryHint()">QUERY</button>
      <button class="hint-btn" onclick="resetChallenge()">RESET</button>
    </div>

    <div class="progress-row">
      <div class="prog-step active" id="p0"></div>
      <div class="prog-step" id="p1"></div>
      <div class="prog-step" id="p2"></div>
    </div>
  </div>
</div>

<div class="footer">// FLAG IS STORED SERVER-SIDE — NO PEEKING IN DEVTOOLS</div>

<script>
const challenges = [
  {
    label: "[ LEVEL 01 ]",
    title: "기본 인증 우회",
    cardLabel: "CHALLENGE_01.exe",
    queryTemplate: (u, p) => `SELECT * FROM users WHERE username='${u}' AND password='${p}'`,
    hints: [
      "SQL 주석(--) 또는 항상 참이 되는 조건을 생각해보세요.",
      "username: admin'-- 또는 ' OR '1'='1 를 시도해보세요."
    ]
  },
  {
    label: "[ LEVEL 02 ]",
    title: "UNION 기반 데이터 추출",
    cardLabel: "CHALLENGE_02.exe",
    queryTemplate: (u) => `SELECT id, username FROM users WHERE username='${u}'`,
    hints: [
      "UNION SELECT로 다른 테이블 데이터를 붙일 수 있어요.",
      "컬럼 수를 맞추세요: ' UNION SELECT 1,'data'--"
    ]
  },
  {
    label: "[ LEVEL 03 ]",
    title: "Blind SQL Injection",
    cardLabel: "CHALLENGE_03.exe",
    queryTemplate: (u) => `SELECT * FROM users WHERE id=${u}`,
    hints: [
      "숫자형 파라미터 — 따옴표 없이 주입돼요.",
      "1 AND 1=1 (참) vs 1 AND 1=2 (거짓) 차이를 확인해보세요."
    ]
  }
];

let level = 0;
let cleared = 0;

function updateUI() {
  const ch = challenges[level];
  document.getElementById('lvl').textContent = level + 1;
  document.getElementById('clr').textContent = cleared;
  document.getElementById('ch-label').textContent = ch.label;
  document.getElementById('ch-title').textContent = ch.title;
  document.getElementById('card-label').textContent = ch.cardLabel;
  document.getElementById('output').className = 'output';
  document.getElementById('output').innerHTML = '';
  document.getElementById('qbox').style.display = 'none';
  document.getElementById('username').value = '';
  document.getElementById('password').value = '';
  for (let i = 0; i < 3; i++) {
    const el = document.getElementById('p' + i);
    el.className = 'prog-step' + (i < cleared ? ' done' : i === level ? ' active' : '');
  }
}

async function tryLogin() {
  const u = document.getElementById('username').value;
  const p = document.getElementById('password').value;
  const out = document.getElementById('output');

  out.className = 'output loading';
  out.textContent = '// Connecting to database...';

  try {
    const res = await fetch('/api/check', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ level: level + 1, username: u, password: p })
    });
    const data = await res.json();

    if (data.success) {
      cleared = Math.max(cleared, level + 1);
      out.className = 'output success';
      out.innerHTML = `// 인증 우회 성공! 플래그를 탈취했습니다.<div class="flag-box">${data.flag}</div>`;
      updateProgress();
      if (level < 2) {
        setTimeout(() => { level++; updateUI(); }, 3500);
      }
    } else {
      out.className = 'output error';
      out.textContent = '// ERROR: 로그인 실패. 자격증명이 올바르지 않습니다.';
    }
  } catch (e) {
    out.className = 'output error';
    out.textContent = '// ERROR: 서버에 연결할 수 없습니다.';
  }
}

function updateProgress() {
  for (let i = 0; i < 3; i++) {
    const el = document.getElementById('p' + i);
    el.className = 'prog-step' + (i < cleared ? ' done' : i === level ? ' active' : '');
  }
  document.getElementById('clr').textContent = cleared;
}

function showHint(i) {
  const out = document.getElementById('output');
  out.className = 'output info';
  out.textContent = '// HINT: ' + challenges[level].hints[i];
}

function showQueryHint() {
  const qbox = document.getElementById('qbox');
  const u = document.getElementById('username').value || '?';
  const p = document.getElementById('password').value || '?';
  const q = challenges[level].queryTemplate(u, p)
    .replace(/\b(SELECT|FROM|WHERE|AND|OR|UNION|INSERT|UPDATE|DELETE|DROP)\b/g, '<span class="kw">$1</span>')
    .replace(/'([^']*)'/g, "'<span class=\"str\">$1</span>'");
  qbox.style.display = 'block';
  qbox.innerHTML = '// QUERY: ' + q;
}

function resetChallenge() {
  document.getElementById('output').className = 'output';
  document.getElementById('output').innerHTML = '';
  document.getElementById('qbox').style.display = 'none';
  document.getElementById('username').value = '';
  document.getElementById('password').value = '';
}

document.getElementById('username').addEventListener('keydown', e => { if (e.key === 'Enter') tryLogin(); });
document.getElementById('password').addEventListener('keydown', e => { if (e.key === 'Enter') tryLogin(); });

updateUI();
</script>
</body>
</html>
