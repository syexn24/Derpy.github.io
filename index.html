<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>나만의 멋진 페이지</title>
    <style>
        /* 기본 폰트 및 배경 설정 */
        body {
            font-family: 'Pretendard', -apple-system, BlinkMacSystemFont, system-ui, Roboto, sans-serif;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: #333;
        }

        /* 메인 카드 컨테이너 */
        .card {
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(10px);
            padding: 2rem;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
            text-align: center;
            max-width: 400px;
            width: 90%;
            transition: transform 0.3s ease;
        }

        .card:hover {
            transform: translateY(-5px);
        }

        /* 프로필 이미지(가상) */
        .profile-img {
            width: 100px;
            height: 100px;
            background: #ddd;
            border-radius: 50%;
            margin: 0 auto 1.5rem;
            background: linear-gradient(45deg, #ff9a9e, #fad0c4);
        }

        h1 {
            margin: 0 0 0.5rem;
            font-size: 1.5rem;
            color: #2d3436;
        }

        p {
            font-size: 0.9rem;
            line-height: 1.6;
            color: #636e72;
            margin-bottom: 1.5rem;
        }

        /* 버튼 스타일 */
        .btn {
            display: inline-block;
            background: #764ba2;
            color: white;
            padding: 0.8rem 1.5rem;
            border-radius: 50px;
            text-decoration: none;
            font-weight: bold;
            transition: background 0.3s ease;
        }

        .btn:hover {
            background: #667eea;
        }
    </style>
</head>
<body>

    <div class="card">
        <div class="profile-img"></div>
        <h1>안녕하세요!</h1>
        <p>HTML과 CSS만으로 만든 심플하고 예쁜 페이지입니다.<br> 
           배경의 그라데이션과 카드 디자인이 조화롭죠? <br>
           이곳에 당신의 멋진 콘텐츠를 채워보세요.</p>
        <a href="#" class="btn" onclick="alert('반갑습니다!')">더 알아보기</a>
    </div>

</body>
</html>
