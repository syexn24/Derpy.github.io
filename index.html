<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>자율연구</title>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --sidebar-bg: #f7f6f3;
      --sidebar-width: 240px;
      --sidebar-text: #37352f;
      --sidebar-muted: #9b9a97;
      --sidebar-hover: #e9e8e4;
      --sidebar-active: #e3e2de;
      --content-bg: #ffffff;
      --text-primary: #37352f;
      --text-secondary: #9b9a97;
      --border: #e8e7e3;
      --font: 'Noto Sans KR', sans-serif;
    }

    body {
      font-family: var(--font);
      background: var(--content-bg);
      color: var(--text-primary);
      display: flex;
      height: 100vh;
      overflow: hidden;
    }

    /* ── 사이드바 ── */
    .sidebar {
      width: var(--sidebar-width);
      background: var(--sidebar-bg);
      height: 100vh;
      overflow-y: auto;
      flex-shrink: 0;
      padding: 12px 0;
      border-right: 1px solid var(--border);
    }

    .sidebar-label {
      font-size: 11px;
      font-weight: 500;
      color: var(--sidebar-muted);
      padding: 8px 14px 4px;
      letter-spacing: 0.04em;
    }

    .sidebar-item {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 5px 14px;
      font-size: 13.5px;
      color: var(--sidebar-text);
      cursor: pointer;
      border-radius: 4px;
      margin: 1px 6px;
      transition: background 0.1s;
      user-select: none;
    }

    .sidebar-item:hover { background: var(--sidebar-hover); }
    .sidebar-item.active { background: var(--sidebar-active); font-weight: 500; }
    .sidebar-item .icon { font-size: 15px; width: 20px; text-align: center; flex-shrink: 0; }

    .sidebar-divider { height: 1px; background: var(--border); margin: 8px 14px; }

    /* ── 메인 ── */
    .main { flex: 1; overflow-y: auto; }

    .page { display: none; padding: 80px 96px 120px; max-width: 860px; animation: fadein 0.15s ease; }
    .page.active { display: block; }

    @keyframes fadein { from { opacity:0; transform: translateY(5px); } to { opacity:1; transform: none; } }

    .page-title {
      font-size: 40px;
      font-weight: 700;
      color: var(--text-primary);
      margin-bottom: 28px;
      letter-spacing: -0.02em;
      line-height: 1.2;
    }

    .page-divider { height: 1px; background: var(--border); margin-bottom: 20px; }

    .date-item {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 4px 6px;
      border-radius: 4px;
      cursor: pointer;
      margin-bottom: 2px;
      transition: background 0.1s;
    }

    .date-item:hover { background: #f1f0ed; }
    .date-item .d-icon { font-size: 14px; color: var(--text-secondary); }
    .date-item .d-text { font-size: 14px; color: var(--text-primary); }

    .back-btn {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      font-size: 13px;
      color: var(--text-secondary);
      cursor: pointer;
      margin-bottom: 32px;
      padding: 4px 8px;
      border-radius: 4px;
      transition: background 0.1s;
    }
    .back-btn:hover { background: var(--sidebar-hover); color: var(--text-primary); }

    .empty-hint { margin-top: 40px; color: #c7c5c0; font-size: 14px; }

    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-thumb { background: #d3d1cb; border-radius: 3px; }
  </style>
</head>
<body>

<nav class="sidebar" id="sidebar"></nav>
<main class="main" id="main"></main>

<script>
/* ================================================================
   ✏️ 수정 가능한 데이터 — 이름, 아이콘, 날짜를 여기서 바꾸세요!
   ================================================================ */
const DATA = {
  sidebarPages: [
    { id: "s1", name: "To Do List",      icon: "😊" },
    { id: "s2", name: "정보과학",          icon: "📋" },
    { id: "s3", name: "자율연구",          icon: "📄", isHome: true },
    { id: "s4", name: "방학",             icon: "✨" },
    { id: "s5", name: "생기부 특기사항",    icon: "📄" },
  ],
  dateItems: [
    { id: "d1", label: "26. 03. 11. WED" },
    { id: "d2", label: "26. 03. 18. WED" },
    { id: "d3", label: "26. 04. 01. WED" },
  ],
};
/* ================================================================ */

const sidebar = document.getElementById('sidebar');
const main    = document.getElementById('main');

// 사이드바 렌더링
sidebar.innerHTML = `
  <div class="sidebar-label">개인 페이지</div>
  ${DATA.sidebarPages.map(p => `
    <div class="sidebar-item${p.isHome ? ' active' : ''}" id="nav-${p.id}" onclick="showPage('${p.id}')">
      <span class="icon">${p.icon}</span><span>${p.name}</span>
    </div>
  `).join('')}
  <div class="sidebar-divider"></div>
`;

// 홈 페이지
main.innerHTML += `
  <div class="page active" id="page-home">
    <div class="page-title">자율연구</div>
    <div class="page-divider"></div>
    ${DATA.dateItems.map(d => `
      <div class="date-item" onclick="showDate('${d.id}')">
        <span class="d-icon">📄</span>
        <span class="d-text">${d.label}</span>
      </div>
    `).join('')}
  </div>
`;

// 사이드바 페이지들
DATA.sidebarPages.filter(p => !p.isHome).forEach(p => {
  main.innerHTML += `
    <div class="page" id="page-${p.id}">
      <div class="back-btn" onclick="showHome()">← 돌아가기</div>
      <div class="page-title">${p.name}</div>
      <div class="page-divider"></div>
      <div class="empty-hint">아직 내용이 없어요.</div>
    </div>
  `;
});

// 날짜 페이지들
DATA.dateItems.forEach(d => {
  main.innerHTML += `
    <div class="page" id="page-${d.id}">
      <div class="back-btn" onclick="showHome()">← 자율연구로 돌아가기</div>
      <div class="page-title">${d.label}</div>
      <div class="page-divider"></div>
      <div class="empty-hint">아직 내용이 없어요.</div>
    </div>
  `;
});

function hideAll() {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.sidebar-item').forEach(i => i.classList.remove('active'));
}

function showHome() {
  hideAll();
  document.getElementById('page-home').classList.add('active');
  const home = DATA.sidebarPages.find(p => p.isHome);
  if (home) document.getElementById('nav-' + home.id).classList.add('active');
}

function showPage(id) {
  hideAll();
  document.getElementById('page-' + id).classList.add('active');
  document.getElementById('nav-' + id).classList.add('active');
}

function showDate(id) {
  hideAll();
  document.getElementById('page-' + id).classList.add('active');
}
</script>
</body>
</html>
